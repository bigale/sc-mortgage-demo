<script>
// Sync the body class with the early-applied html.preload-dark, then provide
// the runtime toggle. Persists to localStorage; re-applies on hashchange (no
// re-render needed because the toggle is just a body class).
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  document.documentElement.classList.toggle('preload-dark', dark);
}
function toggleTheme() {
  const dark = !document.body.classList.contains('dark');
  applyTheme(dark);
  localStorage.setItem('sc-mortgage:theme', dark ? 'dark' : 'light');
}
applyTheme(document.documentElement.classList.contains('preload-dark'));
// Sync tenant decision (made in <head>) onto <body> so theme-<tenant> applies.
if (window.__tenant) document.body.classList.add('theme-' + window.__tenant);
</script>
<script>
// ---- Scenario encoding (per EDGE_SUBSTRATE_ARCHITECTURE.md) -------------
// Hash-based state on a real route. Hash is never sent to the edge or any
// log. CompressionStream + base64url — no library deps.

const ALGO_VERSION = 1;

function b64urlEncode(uint8) {
  let s = '';
  for (let i = 0; i < uint8.length; i++) s += String.fromCharCode(uint8[i]);
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function b64urlDecode(str) {
  const b64 = str.replace(/-/g, '+').replace(/_/g, '/') + '==='.slice((str.length + 3) & 3);
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
async function gzipStr(str) {
  const stream = new Blob([str]).stream().pipeThrough(new CompressionStream('gzip'));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function gunzipBytes(bytes) {
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  return await new Response(stream).text();
}

async function encodeScenario(input, output) {
  const blob = { i: input, t: Date.now(), v: ALGO_VERSION };
  if (output) blob.o = output;
  const gz = await gzipStr(JSON.stringify(blob));
  return b64urlEncode(gz);
}
async function decodeScenario(b64url) {
  const gz = b64urlDecode(b64url);
  const json = await gunzipBytes(gz);
  return JSON.parse(json);
}

// Parse the hash. Two modes:
//   #i=<base64url>   live  — input-only, re-run on open
//   #z=<base64url>   snap  — input + frozen output
async function parseHash() {
  const h = location.hash.slice(1);
  if (!h) return null;
  const eqIdx = h.indexOf('=');
  if (eqIdx < 0) return null;
  const key = h.slice(0, eqIdx), val = h.slice(eqIdx + 1);
  if (key !== 'i' && key !== 'z') return null;
  try {
    const parsed = await decodeScenario(val);
    return { mode: key === 'z' ? 'snapshot' : 'live', ...parsed };
  } catch (e) { return null; }
}

// ---- Recents (localStorage, S1 of the persistence ladder) ----------------
const RECENTS_KEY = 'sc-mortgage:recents:v1';
function getRecents() {
  try { return JSON.parse(localStorage.getItem(RECENTS_KEY) || '[]'); }
  catch { return []; }
}
async function saveRecent(input, output) {
  const recents = getRecents();
  const hash = await encodeScenario(input);
  const label = `$${input.principal.toLocaleString()} @ ${input.rate}% × ${input.years}y`;
  const entry = { hash, label, ts: Date.now(), monthly: output.monthly };
  // Dedupe by label (last write wins), cap at 8
  const filtered = recents.filter((r) => r.label !== label);
  filtered.unshift(entry);
  localStorage.setItem(RECENTS_KEY, JSON.stringify(filtered.slice(0, 8)));
  rebuildRecents();
}

// ---- Math ------------------------------------------------------------------
// inputToScenarioRow — adapter from calc's 4-input shape to the mortgage
// domain's full ScenarioRow. Defaults: Conventional / Good / SFH / Primary /
// StandardCost / FixedRate / 0 points / Current. note_rate is set explicitly
// from user input — bypasses the domain's note_rate-from-rate_environment
// derivation (which is a fallback when note_rate is undefined).
// Per spec wire-domain-into-calc.md (Q3, /domain 2026-05-02): adapter lives
// calc-side because calc is the only consumer of the 4-input shape.
// Income state — soft requirement per /domain Q3. Default $65K (US median
// household income reference). User adjusts via Details section's input.
// inputToScenarioRow reads from this; renderDetails re-renders the grid
// (but not the input itself — preserves focus during typing).
let _incomeValue = 65000;

function onIncomeChange(value) {
  const n = Number(value);
  _incomeValue = (Number.isFinite(n) && n >= 0) ? n : 65000;
  try { recalc(); } catch (_) {}
}

function inputToScenarioRow(input) {
  const p = input.principal || 0;
  const dp = Math.min(input.downPayment || 0, p);  // cap at principal
  return {
    purchase_price: p,
    down_pct: p > 0 ? (dp / p) * 100 : 0,
    term_years: input.years || 0,
    note_rate: input.rate || 0,           // user-input rate is authoritative
    annual_income_fallback: _incomeValue, // from Details income input
    monthly_debts_fallback: 0,            // not surfaced in v1
    // Hidden defaults (8 unsurfaced parameters)
    loan_type: "Conventional",
    credit_tier: "Good",
    property_type: "SFH",
    occupancy: "Primary",
    region: "StandardCost",
    rate_structure: "FixedRate",
    points: 0,
    rate_environment: "Current",          // ignored when note_rate is set
  };
}

function calculate(input) {
  const p = input.principal, dp = input.downPayment || 0;
  const loan = Math.max(0, p - dp);
  if (loan <= 0 || (input.rate || 0) <= 0 || (input.years || 0) <= 0) return null;
  // Run through the mortgage domain pipeline. Per spec, the calc keeps its
  // own PMI formula (calc-side, simpler) for v1 — domain's mortgage_insurance
  // computes but we ignore it here. validateScenario also runs to exercise
  // the wiring (we don't surface its result in v1; deferred to form-expansion).
  const MB = window.MortgageBundle;
  const row = inputToScenarioRow(input);
  const derived = MB.applyDerivations(MB.applyVirtualParams(row, MB.mortgageDomain.virtualParameters || []), MB.mortgageDomain.derivations);
  MB.validateScenario(derived, MB.mortgageDomain.constraints);  // exercise wiring; result intentionally unused
  const monthly = Number(derived.monthly_pi);
  const n = input.years * 12;
  const total = monthly * n;
  const interest = total - loan;
  // PMI stays calc-side (simpler flat 0.5%/yr formula) for v1.
  const dpPct = p > 0 ? (dp / p) : 0;
  const pmi = dpPct < 0.20 ? (loan * 0.005 / 12) : 0;
  return { monthly, total, interest, loan, dpPct, pmi };
}

// ---- UI --------------------------------------------------------------------
let suppressUrlUpdate = false;

function getInput() {
  const v = calcForm.getValues();
  return {
    principal:    parseFloat(v.principal) || 0,
    downPayment:  parseFloat(v.downPayment) || 0,
    rate:         parseFloat(v.rate) || 0,
    years:        parseInt(v.years, 10) || 0,
  };
}

// Track the last-saved input so we can show "Modified" status when the
// form drifts from what's encoded in the URL.
let lastSavedInputJson = null;

function isModified() {
  if (lastSavedInputJson === null) return false;
  return JSON.stringify(getInput()) !== lastSavedInputJson;
}

function setStatus(msg, kind /* 'info' | 'ok' | 'warn' */) {
  // info uses --cssz-muted so it tracks theme; ok/warn stay semantic colors
  // (they convey state, not branding — same hue in light + dark).
  const colors = { info: 'var(--cssz-muted, #888)', ok: '#2e7d32', warn: '#c75300' };
  const c = colors[kind || 'info'];
  shareStatus.setContents(msg
    ? `<span style='color:${c};font-size:12px;'>${escapeHtml(msg)}</span>`
    : '');
}

function refreshStatus() {
  if (lastSavedInputJson === null) {
    setStatus('Click Calculate to see the math; click Save to capture as a shareable link.', 'info');
  } else if (isModified()) {
    setStatus('Modified — click Save to update the link.', 'warn');
  } else {
    setStatus('Saved — URL in address bar reflects this scenario. Use Share to send it.', 'ok');
  }
}

function recalc() {
  const input = getInput();
  const out = calculate(input);
  if (!out) {
    result.setContents("<div class='cssz-result' style='color:var(--cssz-muted,#888);font-size:13px;'>Enter loan amount, rate, and term, then click Calculate.</div>");
    return null;
  }
  const fmt0 = (n) => n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  const fmt2 = (n) => n.toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 });
  // PMI: kept as semantic warning hue (intent: caution about extra cost).
  const pmiLine = out.pmi > 0
    ? `<div style='color:#c75300;font-size:12px;margin-top:4px;'>PMI estimate: <b>+$${fmt2(out.pmi)}/mo</b> (down payment ${(out.dpPct * 100).toFixed(0)}% &lt; 20%)</div>`
    : '';
  // Wrap in .cssz-result so the scenario-load animation can target it.
  result.setContents(
    `<div class='cssz-result'>` +
    `<div style='font-size:24px;color:var(--cssz-accent,#1976d2);font-weight:600;'>$${fmt2(out.monthly)}` +
    `<span style='font-size:14px;color:var(--cssz-muted,#666);font-weight:400;'> / month P&I</span></div>` +
    `<div style='margin-top:6px;font-size:13px;color:var(--cssz-text,#555);'>` +
      `Loan: <b>$${fmt0(out.loan)}</b> &middot; ` +
      `Total paid: <b>$${fmt0(out.total)}</b> &middot; ` +
      `Interest: <b>$${fmt0(out.interest)}</b>` +
    `</div>` + pmiLine +
    `</div>`
  );
  renderBalanceChart(input);
  renderDetails(input);
  renderCTA(input);
  return out;
}

// Plays the scenario-load animation (CSS-driven via body.cssz-loading).
// Self-clears so it can fire again on the next hashchange/recent click.
function playLoadAnimation() {
  document.body.classList.remove('cssz-loading');
  // Force reflow so the animation restarts even if the class was just removed.
  void document.body.offsetWidth;
  document.body.classList.add('cssz-loading');
  setTimeout(() => document.body.classList.remove('cssz-loading'), 800);
}

// ---- Amortization chart (D3) ----------------------------------------------
// Stacked area: per-month payment composition (interest dominant early,
// principal dominant late — the classic mortgage education moment).
function buildAmortization(input) {
  // Delegate to the mortgage bundle's amortizationSchedule (a sibling helper
  // to mortgageDomain — not a Derivation, see spec Q1). Returns the same
  // {month, year, principal, interest, balance} shape; chart code uses
  // {principal, interest} only.
  const loan = Math.max(0, input.principal - (input.downPayment || 0));
  if (loan <= 0 || (input.rate || 0) <= 0 || (input.years || 0) <= 0) return [];
  return window.MortgageBundle.amortizationSchedule({
    loan_amount: loan,
    note_rate: input.rate,
    term_years: input.years,
  });
}

// renderChart() removed in Calc Layout v2 (2026-05-02). Composition chart
// (per-month stacked area) was redundant with the balance chart and added
// vertical sprawl. Educational job migrated to the multi-line cumulative
// balance chart in renderBalanceChart().

// Loan balance line chart — area + line showing remaining principal over time.
// Lives in the "Loan balance over time" SectionStack section.
//
// SC's SectionStack re-creates section item DOMs on expand/collapse animations
// (verified via probe — a `data-tag` attribute on the host div was lost across
// a section close). If we render the SVG into the live DOM, it goes with the
// orphaned old element. Workaround: build the SVG in a detached <div>, then
// hand the HTML string to SC via Label.setContents — SC then owns the contents
// and re-applies them across reflows.
function renderBalanceChart(input) {
  if (!window.d3) return;
  if (!window.balanceChartHostLabel || !balanceChartHostLabel.setContents) return;
  const d3 = window.d3;
  const sched = buildAmortization(input);
  if (!sched.length) {
    balanceChartHostLabel.setContents("<div id='balanceChartHost' style='width:100%;height:224px;'></div>");
    return;
  }

  // Build three series from the per-month schedule:
  //   balance        — remaining loan balance (decreasing)
  //   cumPrincipal   — cumulative principal paid through month m (increasing)
  //   cumInterest    — cumulative interest paid through month m (increasing)
  // Lines cross late in the term — the educational reveal that the deleted
  // composition chart was carrying.
  const loan = Math.max(0, input.principal - (input.downPayment || 0));
  let balance = loan, cumPrincipal = 0, cumInterest = 0;
  const data = [{ year: 0, balance: loan, cumPrincipal: 0, cumInterest: 0 }];
  for (const m of sched) {
    balance -= m.principal;
    cumPrincipal += m.principal;
    cumInterest += m.interest;
    data.push({
      year: m.year,
      balance: Math.max(0, balance),
      cumPrincipal,
      cumInterest,
    });
  }
  const yMax = Math.max(loan, cumInterest);

  // Fixed viewBox + preserveAspectRatio="none" + 100%/100% sizing on the SVG
  // means the chart fills any container size SC gives us, even though we built
  // it in a detached element with no real width.
  const W = 480, H = 224;
  const margin = { top: 6, right: 8, bottom: 22, left: 56 };
  const innerW = W - margin.left - margin.right;
  const innerH = H - margin.top - margin.bottom;

  const tmp = document.createElement('div');
  const svg = d3.select(tmp).append('svg')
    .attr('class', 'cssz-chart')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'none')
    .style('width', '100%').style('height', '100%').style('display', 'block');
  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const x = d3.scaleLinear().domain([0, input.years]).range([0, innerW]);
  const y = d3.scaleLinear().domain([0, yMax]).nice().range([innerH, 0]);

  // Filled area under balance line (visual emphasis on remaining principal).
  const area = d3.area().x(d => x(d.year)).y0(innerH).y1(d => y(d.balance));
  g.append('path').attr('class', 'cssz-balance-area').attr('d', area(data));

  // Three line series: balance, cumulative principal, cumulative interest.
  const lineFor = key => d3.line().x(d => x(d.year)).y(d => y(d[key]));
  g.append('path').attr('class', 'cssz-balance-line').attr('d', lineFor('balance')(data));
  g.append('path').attr('class', 'cssz-cum-principal-line').attr('d', lineFor('cumPrincipal')(data));
  g.append('path').attr('class', 'cssz-cum-interest-line').attr('d', lineFor('cumInterest')(data));

  g.append('g').attr('class', 'cssz-axis')
    .attr('transform', `translate(0,${innerH})`)
    .call(d3.axisBottom(x).ticks(Math.min(6, input.years)).tickFormat(v => `${v}y`));
  g.append('g').attr('class', 'cssz-axis')
    .call(d3.axisLeft(y).ticks(4).tickFormat(v => `$${(v/1000).toFixed(0)}K`));

  // Legend renders above the chart in the same Label content. SectionStack
  // recreates the section item DOM on animate (per /sc-cssz-design rule),
  // so legend lives in setContents — same lifecycle as the chart itself.
  const legend =
    "<div class='cssz-chart-caption' style='padding:0 0 4px;'>" +
      "<span><span class='swatch balance'></span>Balance</span>" +
      "<span><span class='swatch cum-principal'></span>Principal paid</span>" +
      "<span><span class='swatch cum-interest'></span>Interest paid</span>" +
    "</div>";
  balanceChartHostLabel.setContents(
    "<div id='balanceChartHost' style='width:100%;height:224px;display:flex;flex-direction:column;'>" +
      legend +
      "<div style='flex:1;min-height:0;'>" + tmp.innerHTML + "</div>" +
    "</div>"
  );
}

// ---- Details section (Calc Layout v2) -------------------------------------
// Income input + 4 grouped subsections of all numeric/computed values.
// Renders into two SC Labels (detailsIncome + detailsGrid) inside the
// section_details section of exploreStack.

function setupDetailsIncome() {
  if (!window.detailsIncome || !detailsIncome.setContents) return;
  // Render the input with the CURRENT _incomeValue baked in. SC re-applies
  // setContents when sections animate, so this string IS the source of truth
  // — we never touch the live DOM input value directly. User typing fires
  // oninput → onIncomeChange which updates _incomeValue but does NOT re-call
  // setContents (preserves focus). When the section animates, the most
  // recent setContents is replayed; we proactively setContents here on
  // section open (handled in the click listener) so the latest value shows.
  detailsIncome.setContents(
    "<div class='cssz-details-income'>" +
      "<label for='incomeInput'>Annual income</label>" +
      "<input id='incomeInput' type='number' value='" + _incomeValue +
        "' min='0' step='5000' oninput='onIncomeChange(this.value)'>" +
      "<span class='hint'>US median ~$65K. Adjust to refine DTI.</span>" +
    "</div>"
  );
}

function renderDetails(input) {
  if (!window.MortgageBundle) return;
  if (!window.detailsGrid || !detailsGrid.setContents) return;
  const MB = window.MortgageBundle;
  const row = inputToScenarioRow(input);
  const withVirtual = MB.applyVirtualParams(row, MB.mortgageDomain.virtualParameters || []);
  const derived = MB.applyDerivations(withVirtual, MB.mortgageDomain.derivations);

  const out = calculate(input);
  if (!out) { detailsGrid.setContents(''); return; }

  const fmt0 = (n) => Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 });
  const fmt2 = (n) => Number(n).toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 });
  const pct  = (n, d) => Number(n).toFixed(d == null ? 2 : d) + '%';
  const dtiSafe = Number.isFinite(Number(derived.dti)) && Number(derived.dti) < 999 ? pct(derived.dti) : '—';
  const qmSafe  = derived.qm_status && derived.qm_status !== undefined ? String(derived.qm_status) : '—';

  const sections = [
    {
      title: 'Loan',
      rows: [
        ['Loan amount',         '$' + fmt0(derived.loan_amount)],
        ['LTV',                 pct(derived.ltv)],
        ['Down payment %',      pct(out.dpPct * 100)],
        ['Note rate',           pct(derived.note_rate)],
        ['Monthly rate',        pct(Number(derived.note_rate) / 12, 4)],
        ['Number of payments',  String(input.years * 12)],
      ],
    },
    {
      title: 'Monthly',
      rows: [
        ['Principal & Interest', '$' + fmt2(derived.monthly_pi)],
        ['Tax & Insurance (est.)', '$' + fmt2(derived.est_tax_ins)],
        ['Mortgage Insurance',   '$' + fmt2(out.pmi)],
        ['Total monthly housing', '$' + fmt2(Number(derived.monthly_pi) + Number(derived.est_tax_ins) + Number(out.pmi))],
      ],
    },
    {
      title: 'Borrower',
      rows: [
        ['DTI',        dtiSafe],
        ['QM Status',  qmSafe],
      ],
    },
    {
      title: 'Lifetime',
      rows: [
        ['Total interest', '$' + fmt0(derived.lifetime_interest)],
        ['Total paid',     '$' + fmt0(out.total)],
        ['Cash to close',  '$' + fmt0(derived.cash_to_close)],
      ],
    },
  ];

  const html = sections.map(function (s) {
    return "<div class='cssz-details-section'>" +
      "<div class='cssz-details-section-title'>" + escapeHtml(s.title) + "</div>" +
      s.rows.map(function (r) {
        return "<div class='cssz-details-row'>" +
          "<span>" + escapeHtml(r[0]) + "</span>" +
          "<span class='cssz-details-val'>" + escapeHtml(r[1]) + "</span>" +
        "</div>";
      }).join('') +
    "</div>";
  }).join('');

  detailsGrid.setContents(html);
}

// ---- Dynamic affiliate CTA ------------------------------------------------
// Computes a 15-year alternative and pitches the savings. Copy is generated
// from the user's actual numbers — feels like insight, not advertising.
// AFFILIATE: replace the example.com URL with the partner deep-link template.
function compute15yrAlt(input) {
  if ((input.years || 0) <= 15) return null;  // already 15yr or shorter
  const alt = Object.assign({}, input, { years: 15 });
  const altOut = calculate(alt);
  const curOut = calculate(input);
  if (!altOut || !curOut) return null;
  const sched30 = buildAmortization(input);
  const sched15 = buildAmortization(alt);
  const interest30 = sched30.reduce((s, m) => s + m.interest, 0);
  const interest15 = sched15.reduce((s, m) => s + m.interest, 0);
  return {
    monthly15: altOut.monthly,
    monthlyDelta: altOut.monthly - curOut.monthly,
    interestSaved: interest30 - interest15,
  };
}

function renderCTA(input) {
  const content = document.getElementById('ctaContent');
  if (!content) return;
  const alt = compute15yrAlt(input);
  if (!alt) { content.innerHTML = ''; return; }
  const fmt0 = n => n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  // Affiliate URL: stub. Replace example.com with the partner host. UTM params
  // identify the source so the partner can revenue-share appropriately.
  const ctaUrl = 'https://example.com/quote?term=15&loan=' + Math.round(input.principal - (input.downPayment||0)) +
                 '&rate=' + input.rate + '&utm_source=ddd-mortgage&utm_medium=calculator&utm_campaign=15yr-savings';
  content.innerHTML =
    "<div class='cssz-cta'>" +
      "<div class='copy'>" +
        "<div class='head'>A 15-year loan saves you $" + fmt0(alt.interestSaved) + " in interest</div>" +
        "<div class='sub'>Monthly: $" + fmt0(alt.monthly15) + " (+$" + fmt0(alt.monthlyDelta) + "/mo). Compare offers from our partners.</div>" +
      "</div>" +
      "<a class='btn' href='" + ctaUrl + "' target='_blank' rel='noopener'>Get a quote &rarr;</a>" +
    "</div>";
}

// ---- Explore SectionStack — dynamic height ---------------------------------
// Keeps the stack exactly as tall as its expanded sections need. When you add
// a new section, add its expanded content height here and update the
// SectionStack `sections` array. No other code change.
const EXPLORE_SECTIONS = {
  section_details:   516,  // 38 (income input) + 478 (4-group grid)
  section_balance:   240,
  section_breakdown: 60,
  section_compare:   60,
};
// Tahoe SC section header is 37px (verified via probe — sectionHeaderopened
// element). Plus a small pad keeps content from kissing the edges.
const SECTION_HEADER_H = 37;
const STACK_PAD = 4;

function resizeExploreStack() {
  if (!window.exploreStack || !exploreStack.setHeight) return;
  let total = STACK_PAD;
  for (const id of Object.keys(EXPLORE_SECTIONS)) {
    total += SECTION_HEADER_H;
    if (exploreStack.sectionIsExpanded && exploreStack.sectionIsExpanded(id)) {
      total += EXPLORE_SECTIONS[id];
    }
  }
  exploreStack.setHeight(total);
}

// Delegated section-header click listener. SC stamps `sectionHeaderopened`
// or `sectionHeaderclosed` on the header TD (state-suffixed, no space, like
// other SC class conventions). [class*="sectionHeader"] catches both.
// Defer the resize until SC's animation settles (~300ms) so sectionIsExpanded
// reports the new state. Re-renders the balance chart if its section is now
// open — host had 0 height while collapsed, so first paint after expand
// would be empty otherwise.
document.addEventListener('click', (e) => {
  if (!e.target.closest) return;
  if (!e.target.closest('[class*="sectionHeader"], [eventproxy^="isc_SectionHeader_"]')) return;
  setTimeout(() => {
    resizeExploreStack();
    if (!window.exploreStack || !exploreStack.sectionIsExpanded) return;
    // Re-render contents that were hidden while collapsed (host has 0 height
    // → first render after expand would be empty otherwise).
    if (exploreStack.sectionIsExpanded('section_balance')) {
      try { renderBalanceChart(getInput()); } catch (_) {}
    }
    if (exploreStack.sectionIsExpanded('section_details')) {
      try { setupDetailsIncome(); renderDetails(getInput()); } catch (_) {}
    }
  }, 350);
});

// When d3 arrives (async ESM import), re-render the current calc.
window.addEventListener('d3-ready', () => { try { recalc(); } catch (_) {} });
// Re-render charts on resize so they fill their containers.
window.addEventListener('resize', () => {
  try { renderBalanceChart(getInput()); } catch (_) {}
});

// Save action: commits current form values as the canonical scenario.
// Updates URL hash, adds to recents, clears the modified state.
async function saveScenario() {
  const input = getInput();
  const out = recalc(); // make sure result panel matches
  if (!out) { setStatus('Fill in all fields before saving.', 'warn'); return null; }
  const hash = await encodeScenario(input);
  history.replaceState(null, '', '#i=' + hash);
  await saveRecent(input, out);
  lastSavedInputJson = JSON.stringify(input);
  refreshStatus();
  return { input, out, url: location.origin + location.pathname + '#i=' + hash };
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  return Promise.reject(new Error('clipboard unavailable'));
}

async function nativeShare(url, title, text) {
  if (!navigator.share) return false;
  try {
    await navigator.share({ url, title, text });
    return true;
  } catch (e) {
    if (e.name === 'AbortError') return true; // user cancelled — that's fine
    return false;
  }
}

// Build the QR data-uri image tag for any URL.
function buildQrImg(url) {
  // Pick the smallest QR version that fits, error correction M (~15% damage tolerance).
  // qrcode-generator picks version automatically when typeNumber=0.
  const qr = qrcode(0, 'M');
  qr.addData(url);
  qr.make();
  // cellSize=4, margin=2 → ~150-200px image for our URL sizes
  return qr.createImgTag(4, 8);
}

// Open the share modal. mode = 'live' (input only, re-runs on open)
//                            'snapshot' (input + frozen output)
//
// Requires a saved scenario. If the form is unsaved/modified, prompt to
// save first — sharing should always reflect a deliberate snapshot of state.
async function openShare(mode) {
  if (lastSavedInputJson === null || isModified()) {
    isc.confirm('Save current values first?', function (ok) {
      if (ok) saveScenario().then(function () { openShare(mode); });
    });
    return;
  }
  const input = getInput();
  const out = calculate(input);
  if (!out) {
    isc.warn('Enter loan details first.');
    return;
  }

  // Build URL
  const payload = mode === 'snapshot'
    ? await encodeScenario(input, { monthly: out.monthly, total: out.total, interest: out.interest, pmi: out.pmi })
    : await encodeScenario(input);
  const url = location.origin + location.pathname + '#' + (mode === 'snapshot' ? 'z' : 'i') + '=' + payload;

  const title = 'Mortgage scenario';
  const labelText = mode === 'snapshot'
    ? `Snapshot · ${url.length} chars · recipient sees the captured monthly`
    : `Live link · ${url.length} chars · recalculates on open`;

  const imgTag = buildQrImg(url);
  const hasNativeShare = !!navigator.share;

  // Compose the modal content as HTMLFlow + buttons row
  // Use a SC Window with members.
  // Render QR with cellSize=3 (smaller), margin=4 — keeps the image to ~180px
  // for a 250-char URL (version 7 QR, 45 modules × 3 + 8 margin ≈ 143px).
  // Old cellSize=4, margin=8 produced a ~244px QR that overflowed the window.
  const qr = qrcode(0, 'M');
  qr.addData(url);
  qr.make();
  const compactImgTag = qr.createImgTag(3, 4);

  const win = isc.Window.create({
    title: 'Share scenario',
    width: 440,
    height: 540,
    autoCenter: true,
    isModal: true,
    showModalMask: true,
    canDragResize: false,
    showMaximizeButton: false,
    showMinimizeButton: false,
    closeClick: function () { this.destroy(); },
    items: [
      isc.VLayout.create({
        width: '100%', height: '100%', padding: 16, membersMargin: 10,
        overflow: 'hidden',
        members: [
          isc.Label.create({
            width: '100%', height: 200, align: 'center',
            contents: "<div style='text-align:center;line-height:1;'>" + compactImgTag + "</div>"
          }),
          isc.Label.create({
            width: '100%', height: 28, align: 'center', wrap: false,
            contents: "<div style='font-size:11px;color:var(--cssz-muted,#666);line-height:1.3;'>" + escapeHtml(labelText) + "</div>"
          }),
          isc.Label.create({
            width: '100%', height: 32,
            contents:
              "<input type='text' id='shareUrlInput' value='" + escapeHtml(url) + "' readonly " +
              "onclick='this.select();' " +
              "style='width:100%;box-sizing:border-box;padding:6px;font-family:var(--cssz-mono,monospace);font-size:11px;" +
              "background:var(--cssz-input-bg,#fff);color:var(--cssz-text,#000);" +
              "border:1px solid var(--cssz-border,#ccc);border-radius:3px;' />"
          }),
          isc.HLayout.create({
            width: '100%', height: 32, membersMargin: 8, align: 'center',
            members: [
              isc.Button.create({
                title: 'Copy URL', width: 100,
                click: function () {
                  copyToClipboard(url).then(
                    function () { isc.say('Copied to clipboard'); },
                    function () { isc.warn('Copy failed — select the URL above and copy manually.'); }
                  );
                }
              }),
              isc.Button.create({
                title: hasNativeShare ? 'Native share…' : 'Share unavailable',
                width: 130,
                disabled: !hasNativeShare,
                click: function () {
                  nativeShare(url, title, mode === 'snapshot' ? 'See this mortgage scenario' : 'Mortgage calculator link');
                }
              }),
              isc.Button.create({
                title: 'Close', width: 70,
                click: function () { win.destroy(); }
              })
            ]
          }),
          isc.Label.create({
            width: '100%', height: 50, padding: 4,
            contents: "<div style='font-size:10px;color:var(--cssz-muted,#888);line-height:1.5;'>" +
              "<b>Phone:</b> open camera, point at QR — opens this scenario on mobile." +
              "<br><b>Mobile share:</b> Native share opens iMessage / Mail / WhatsApp / AirDrop." +
              "<br><b>Anywhere:</b> Copy URL pastes the link." +
              "</div>"
          })
        ]
      })
    ]
  });
  win.show();
}

// Click dispatcher for archetype rows. Computes the calc's 4-input hash from
// the archetype's full ScenarioRow + displayedRate, then sets location.hash
// (triggers existing hashchange → restoreFromHash → form/chart update flow).
// Per spec archetype-picker.md: same flow as recents, no new URL format.
async function loadArchetype(id) {
  if (!window.MortgageBundle) return;
  const a = window.MortgageBundle.archetypes.find((x) => x.id === id);
  if (!a) return;
  const principal = Number(a.scenario.purchase_price);
  const downPayment = principal * Number(a.scenario.down_pct) / 100;
  const input = {
    principal,
    downPayment,
    rate: a.displayedRate,
    years: Number(a.scenario.term_years),
  };
  const hash = await encodeScenario(input);
  location.hash = 'i=' + hash;
}

// Mini-header style for "Common scenarios" / "Your saves" subsections within
// the Pick-a-scenario row. Per /sc-cssz-design: --cssz-muted text, uppercase
// tracking, no padding on SC-measured elements (we're inside the Label's
// inner content, so this is content-side, fine).
const PICKER_HEADER_STYLE = "font-size:10px;text-transform:uppercase;letter-spacing:0.08em;" +
  "color:var(--cssz-muted,#888);padding:8px 8px 4px;";
const PICKER_ROW_STYLE = "display:flex;justify-content:space-between;align-items:center;" +
  "padding:5px 8px;text-decoration:none;color:var(--cssz-text,#333);" +
  "border-bottom:1px solid var(--cssz-border-soft,#eee);";
const PICKER_ROW_TAGLINE_STYLE = "color:var(--cssz-muted,#888);font-size:11px;margin-top:1px;";
const PICKER_ROW_MONTHLY_STYLE = "color:var(--cssz-accent,#1976d2);font-weight:500;white-space:nowrap;margin-left:8px;";
const PICKER_EMPTY_STYLE = "color:var(--cssz-muted,#888);font-size:11px;font-style:italic;padding:6px 8px;";

// Compute monthly P&I for an archetype using the same domain pipeline the
// calc uses for the result panel. Done at render time per spec (no per-
// archetype precomputation in the bundle — keeps numbers fresh if domain
// math evolves).
function archetypeMonthly(a) {
  if (!window.MortgageBundle) return null;
  const principal = Number(a.scenario.purchase_price);
  const down = principal * Number(a.scenario.down_pct) / 100;
  const loan = Math.max(0, principal - down);
  const sched = window.MortgageBundle.amortizationSchedule({
    loan_amount: loan,
    note_rate: a.displayedRate,
    term_years: Number(a.scenario.term_years),
  });
  if (!sched.length) return null;
  return sched[0].principal + sched[0].interest;
}

function archetypeRow(a) {
  const m = archetypeMonthly(a);
  const monthly = m
    ? `$${m.toLocaleString('en-US', { maximumFractionDigits: 0 })}/mo`
    : '';
  // onclick dispatcher (not href=javascript:) because computing the hash is
  // async (encodeScenario uses CompressionStream). The dispatcher handles
  // the await; the link itself is sync.
  return `<a href='#' onclick='loadArchetype(${JSON.stringify(a.id)});return false;' style='${PICKER_ROW_STYLE}'>` +
    `<span><div>${escapeHtml(a.name)}</div>` +
    `<div style='${PICKER_ROW_TAGLINE_STYLE}'>${escapeHtml(a.tagline)}</div></span>` +
    `<span style='${PICKER_ROW_MONTHLY_STYLE}'>${escapeHtml(monthly)}</span></a>`;
}

function recentRow(r) {
  const monthly = r.monthly
    ? `$${r.monthly.toLocaleString('en-US', { maximumFractionDigits: 0 })}/mo`
    : '';
  // void(...) suppresses the assignment's return value — without it, the
  // browser would render the resulting string as the entire page body
  // (a classic javascript: URL footgun).
  return `<a href='javascript:void(location.hash="i=${r.hash}")' style='${PICKER_ROW_STYLE}'>` +
    `<span>${escapeHtml(r.label)}</span>` +
    `<span style='${PICKER_ROW_MONTHLY_STYLE}'>${escapeHtml(monthly)}</span></a>`;
}

// Calc Layout v2 (2026-05-02): the Pick-a-scenario row split into two
// independent surfaces — Picker sidebar (archetypes, beside form on desktop)
// and Saves row (recents, below). Each renders into its own SC Label.
// Mini-headers are now the section labels above each Label, not embedded
// in contents. Per /sc-cssz-design discipline: render via setContents.
function rebuildArchetypes() {
  const archs = (window.MortgageBundle && window.MortgageBundle.archetypes) || [];
  if (!window.archetypesList || !archetypesList.setContents) return;
  archetypesList.setContents(archs.map(archetypeRow).join(''));
}

function rebuildSaves() {
  const recents = getRecents();
  if (!window.savesList || !savesList.setContents) return;
  savesList.setContents(
    recents.length
      ? recents.map(recentRow).join('')
      : `<div style='${PICKER_EMPTY_STYLE}'>Your saves will appear here. Click <b>Save</b> after calculating.</div>`
  );
}

// Backward-compat alias: existing call sites use rebuildRecents. Now refreshes
// both surfaces.
function rebuildRecents() { rebuildArchetypes(); rebuildSaves(); }

async function restoreFromHash() {
  const parsed = await parseHash();
  if (!parsed) return false;
  const restoredInput = {
    principal:   parsed.i.principal || 0,
    downPayment: parsed.i.downPayment || 0,
    rate:        parsed.i.rate || 0,
    years:       parsed.i.years || 0,
  };
  calcForm.setValues(restoredInput);
  recalc();
  playLoadAnimation();
  // Mark this as the saved baseline — edits-against-it will trigger Modified.
  lastSavedInputJson = JSON.stringify(restoredInput);
  refreshStatus();
  if (parsed.mode === 'snapshot' && parsed.o) {
    const captured = new Date(parsed.t).toLocaleString();
    snapshotBanner.setContents(
      `<div style='background:#fff8e1;border-left:3px solid #f57c00;padding:6px 10px;font-size:12px;color:#5d4037;'>` +
      `<b>Snapshot</b> captured ${captured}. ` +
      `Sender's monthly was <b>$${parsed.o.monthly.toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 })}</b>. ` +
      `Live recompute shown above (any rate/value changes since then would shift it). ` +
      `Edit + Save to capture your own variant.` +
      `</div>`
    );
    snapshotBanner.show();
  } else {
    snapshotBanner.hide();
  }
  return true;
}

// ---- Bootstrap -------------------------------------------------------------
// Calc Layout v2 (2026-05-02): adaptive root layout based on isc.Browser.isHandset.
//   Desktop: HLayout(formColumn 520px, pickerSidebar 300px); root width 840.
//   Handset: VLayout-flat — form/result/action/status + picker stacked.
// Saves row stays at the bottom in both layouts. See spec calc-layout-v2.md.
const _isHandset = !!(isc.Browser && isc.Browser.isHandset);

// Form column widgets — same set in both layouts; just wrapped differently.
const _formMembers = [
  isc.DynamicForm.create({
    ID: "calcForm",
    width: "100%",
    numCols: 2,
    colWidths: [160, "*"],
    titleOrientation: "left",
    autoFocus: true,
    // type:"text" not "float"/"integer". SC's FloatItem doesn't sync DOM →
    // model in this setup; type:"text" + parseFloat in calculate() works.
    // `changed` (post-commit), not `change` (per-keystroke).
    fields: [
      { name: "principal",   title: "Home Price ($)",     type: "text", defaultValue: "350000", changed: refreshStatus },
      { name: "downPayment", title: "Down Payment ($)",   type: "text", defaultValue: "50000",  changed: refreshStatus },
      { name: "rate",        title: "Interest Rate (%)",  type: "text", defaultValue: "7",      changed: refreshStatus },
      { name: "years",       title: "Term (years)",       type: "text", defaultValue: "30",     changed: refreshStatus }
    ]
  }),
  isc.Label.create({ ID: "result", height: 80, padding: 4, overflow: "hidden", contents: "" }),
  isc.HLayout.create({
    ID: "actionBar",
    height: 32,
    membersMargin: 6,
    members: [
      isc.Button.create({ ID: "btnCalc",        title: "Calculate",     width: 100,
        click: function() { recalc(); refreshStatus(); } }),
      isc.Button.create({ ID: "btnSave",        title: "Save",          width: 80,
        click: function() { saveScenario(); } }),
      isc.Button.create({ ID: "btnShareLive",   title: "Share Live",    width: 100,
        click: function() { openShare('live'); } }),
      isc.Button.create({ ID: "btnShareSnap",   title: "Share Snapshot", width: 130,
        click: function() { openShare('snapshot'); } })
    ]
  }),
  isc.Label.create({ ID: "shareStatus", width: "100%", height: 22, padding: 2, contents: "" }),
];

// Picker sidebar — Common scenarios only (saves split into its own row below).
const _pickerMembers = [
  isc.Label.create({ height: 18,
    contents: "<div style='font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--cssz-muted,#888);'>Common scenarios</div>" }),
  isc.Label.create({ ID: "archetypesList", height: 320, overflow: "auto",
                     padding: 0, valign: "top", align: "left", contents: "" }),
];

// CTA + exploreStack + saves row — always at the bottom of root VLayout.
const _ctaBanner = isc.Label.create({ ID: "ctaBanner", width: "100%", height: 70, padding: 0, overflow: "hidden",
  contents: "<div id='ctaContent'></div>" });

const _exploreStack = isc.SectionStack.create({
  ID: "exploreStack",
  width: "100%",
  // Initial height: 4 headers (37×4) + balance content (240) + pad (4) = 392.
  // Updated dynamically by resizeExploreStack() on init + every header click.
  // Calc Layout v2 (2026-05-02): added section_details at position 0; default
  // closed; opens with income input + 4-group derived-values grid.
  height: 392,
  visibilityMode: "multiple",
  animateSections: true,
  sections: [
    {
      ID: "section_details",
      title: "Details — all values",
      expanded: false,
      items: [
        isc.Label.create({ ID: "detailsIncome", height: 38, padding: 8, overflow: "hidden", contents: "" }),
        isc.Label.create({ ID: "detailsGrid",   height: 478, padding: 8, overflow: "auto",   contents: "" }),
      ]
    },
    {
      ID: "section_balance",
      title: "Loan balance over time",
      expanded: true,
      items: [
        isc.Label.create({ ID: "balanceChartHostLabel", height: 240, padding: 8, overflow: "hidden",
          contents: "<div id='balanceChartHost' style='width:100%;height:224px;'></div>" })
      ]
    },
    {
      ID: "section_breakdown",
      title: "Year-by-year breakdown",
      expanded: false,
      items: [
        isc.Label.create({ height: 60, padding: 8,
          contents: "<div class='cssz-section-empty'>Per-year principal/interest/balance table — coming next.</div>" })
      ]
    },
    {
      ID: "section_compare",
      title: "Compare with another scenario",
      expanded: false,
      items: [
        isc.Label.create({ height: 60, padding: 8,
          contents: "<div class='cssz-section-empty'>Pick a recent and overlay its amortization on this one — coming next.</div>" })
      ]
    }
  ],
  autoDraw: false
});

const _savesMembers = [
  isc.Label.create({ height: 18,
    contents: "<div style='font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--cssz-muted,#888);'>Your saves</div>" }),
  isc.Label.create({ ID: "savesList", height: 160, overflow: "auto",
                     padding: 0, valign: "top", align: "left", contents: "" }),
];

// Form-and-picker section: HLayout (desktop) wraps two columns; handset
// flattens into the parent VLayout's members. Saves stays at the root level.
const _formAndPicker = _isHandset
  ? [..._formMembers, ..._pickerMembers]
  : [
      isc.HLayout.create({
        width: "100%",
        membersMargin: 16,
        autoHeight: true,
        members: [
          isc.VLayout.create({ width: 520, autoHeight: true, members: _formMembers, autoDraw: false }),
          isc.VLayout.create({ width: 300, autoHeight: true, members: _pickerMembers, autoDraw: false }),
        ],
        autoDraw: false,
      })
    ];

isc.VLayout.create({
  ID: "root",
  width: _isHandset ? 520 : 840,
  autoDraw: true,
  padding: 24,
  membersMargin: 12,
  members: [
    isc.Label.create({
      height: 40,
      contents: "<div style='font-size:20px;font-weight:600;color:var(--cssz-text,#222);'>Mortgage Calculator</div>" +
                "<div style='font-size:11px;color:var(--cssz-muted,#888);'>Save scenarios via URL — works across devices, no account.</div>"
    }),
    isc.Label.create({ ID: "snapshotBanner", height: 1, visibility: "hidden", contents: "" }),
    ..._formAndPicker,
    _ctaBanner,
    _exploreStack,
    ..._savesMembers,
  ]
});

(async function init() {
  resizeExploreStack();
  const restored = await restoreFromHash();
  if (!restored) {
    // Fresh load — show defaults but don't auto-calculate. The user drives
    // the first compute via the Calculate button.
    refreshStatus();
  }
  rebuildRecents();
})();

window.addEventListener('hashchange', restoreFromHash);
</script>
</body>
</html>
