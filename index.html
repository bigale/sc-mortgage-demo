<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mortgage Calculator</title>
<link rel="icon" href="data:,">
<script>var isomorphicDir = "smartclient/";</script>
<script src="smartclient/system/modules/ISC_Core.js"></script>
<script src="smartclient/system/modules/ISC_Foundation.js"></script>
<script src="smartclient/system/modules/ISC_Containers.js"></script>
<script src="smartclient/system/modules/ISC_Forms.js"></script>
<script src="smartclient/skins/Tahoe/load_skin.js"></script>
</head>
<body>
<script>
function recalc() {
  var v = calcForm.getValues();
  var p = parseFloat(v.principal) || 0;
  var rate = parseFloat(v.rate) || 0;
  var years = parseInt(v.years, 10) || 0;
  var r = rate / 100 / 12;
  var n = years * 12;
  if (p <= 0 || r <= 0 || n <= 0) {
    result.setContents("<div style='color:#888;font-size:13px;'>Enter loan amount, rate, and term.</div>");
    return;
  }
  var pmt = (p * r) / (1 - Math.pow(1 + r, -n));
  var total = pmt * n;
  var interest = total - p;
  result.setContents(
    "<div style='font-size:24px;color:#1976d2;font-weight:600;'>$" +
    pmt.toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 }) +
    " <span style='font-size:14px;color:#666;font-weight:400;'>/ month</span></div>" +
    "<div style='margin-top:8px;font-size:13px;color:#555;'>" +
      "Total paid: <b>$" + total.toLocaleString('en-US', { maximumFractionDigits: 0 }) + "</b> &middot; " +
      "Interest: <b>$" + interest.toLocaleString('en-US', { maximumFractionDigits: 0 }) + "</b>" +
    "</div>"
  );
}

isc.VLayout.create({
  ID: "root",
  width: 480,
  autoDraw: true,
  padding: 24,
  membersMargin: 16,
  members: [
    isc.Label.create({
      height: 36,
      contents: "<div style='font-size:20px;font-weight:600;color:#222;'>Mortgage Calculator</div>" +
                "<div style='font-size:11px;color:#888;'>SmartClient on Cloudflare Pages &middot; no build, no bundler</div>"
    }),
    isc.DynamicForm.create({
      ID: "calcForm",
      width: "100%",
      numCols: 2,
      colWidths: [140, "*"],
      titleOrientation: "left",
      autoFocus: true,
      fields: [
        { name: "principal", title: "Loan Amount ($)",  type: "float",   defaultValue: 300000, change: recalc, keyPress: recalc },
        { name: "rate",      title: "Interest Rate (%)",type: "float",   defaultValue: 7.5,    change: recalc, keyPress: recalc },
        { name: "years",     title: "Term (years)",     type: "integer", defaultValue: 30,     change: recalc, keyPress: recalc }
      ]
    }),
    isc.Label.create({ ID: "result", height: 70, padding: 8, overflow: "hidden", contents: "" })
  ]
});

setTimeout(recalc, 0);
</script>
</body>
</html>
