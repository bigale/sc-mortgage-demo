<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mortgage Calculator</title>
<meta name="description" content="Free mortgage calculator. Save and share scenarios via URL — no account, no tracking. Down payment, PMI, monthly payment, total interest.">
<meta property="og:title" content="Mortgage Calculator — share scenarios via URL">
<meta property="og:description" content="Free mortgage calculator with shareable URLs. No account required.">
<link rel="icon" href="data:,">
<script>var isomorphicDir = "smartclient/";</script>
<script src="smartclient/system/modules/ISC_Core.js"></script>
<script src="smartclient/system/modules/ISC_Foundation.js"></script>
<script src="smartclient/system/modules/ISC_Containers.js"></script>
<script src="smartclient/system/modules/ISC_Forms.js"></script>
<!-- ISC_DataBinding required: SC's form change handler internally calls
     RPCManager.startQueue() which lives in this module. Without it, the
     form's keystroke handler throws silently and user edits don't stick
     (DOM updates but model reverts on blur). +400KB brotli, but mandatory. -->
<script src="smartclient/system/modules/ISC_DataBinding.js"></script>
<script src="smartclient/skins/Tahoe/load_skin.js"></script>
<script src="lib/qrcode.min.js"></script>
</head>
<body>
<script>
// ---- Scenario encoding (per EDGE_SUBSTRATE_ARCHITECTURE.md) -------------
// Hash-based state on a real route. Hash is never sent to the edge or any
// log. CompressionStream + base64url — no library deps.

const ALGO_VERSION = 1;

function b64urlEncode(uint8) {
  let s = '';
  for (let i = 0; i < uint8.length; i++) s += String.fromCharCode(uint8[i]);
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function b64urlDecode(str) {
  const b64 = str.replace(/-/g, '+').replace(/_/g, '/') + '==='.slice((str.length + 3) & 3);
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
async function gzipStr(str) {
  const stream = new Blob([str]).stream().pipeThrough(new CompressionStream('gzip'));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function gunzipBytes(bytes) {
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  return await new Response(stream).text();
}

async function encodeScenario(input, output) {
  const blob = { i: input, t: Date.now(), v: ALGO_VERSION };
  if (output) blob.o = output;
  const gz = await gzipStr(JSON.stringify(blob));
  return b64urlEncode(gz);
}
async function decodeScenario(b64url) {
  const gz = b64urlDecode(b64url);
  const json = await gunzipBytes(gz);
  return JSON.parse(json);
}

// Parse the hash. Two modes:
//   #i=<base64url>   live  — input-only, re-run on open
//   #z=<base64url>   snap  — input + frozen output
async function parseHash() {
  const h = location.hash.slice(1);
  if (!h) return null;
  const eqIdx = h.indexOf('=');
  if (eqIdx < 0) return null;
  const key = h.slice(0, eqIdx), val = h.slice(eqIdx + 1);
  if (key !== 'i' && key !== 'z') return null;
  try {
    const parsed = await decodeScenario(val);
    return { mode: key === 'z' ? 'snapshot' : 'live', ...parsed };
  } catch (e) { return null; }
}

// ---- Recents (localStorage, S1 of the persistence ladder) ----------------
const RECENTS_KEY = 'sc-mortgage:recents:v1';
function getRecents() {
  try { return JSON.parse(localStorage.getItem(RECENTS_KEY) || '[]'); }
  catch { return []; }
}
async function saveRecent(input, output) {
  const recents = getRecents();
  const hash = await encodeScenario(input);
  const label = `$${input.principal.toLocaleString()} @ ${input.rate}% × ${input.years}y`;
  const entry = { hash, label, ts: Date.now(), monthly: output.monthly };
  // Dedupe by label (last write wins), cap at 8
  const filtered = recents.filter((r) => r.label !== label);
  filtered.unshift(entry);
  localStorage.setItem(RECENTS_KEY, JSON.stringify(filtered.slice(0, 8)));
  rebuildRecents();
}

// ---- Math ------------------------------------------------------------------
function calculate(input) {
  const p = input.principal, dp = input.downPayment || 0;
  const loan = Math.max(0, p - dp);
  const r = input.rate / 100 / 12;
  const n = input.years * 12;
  if (loan <= 0 || r <= 0 || n <= 0) return null;
  const monthly = (loan * r) / (1 - Math.pow(1 + r, -n));
  const total = monthly * n;
  const interest = total - loan;
  // PMI: typical lender estimate ~0.5%/yr of loan when down < 20%
  const dpPct = p > 0 ? (dp / p) : 0;
  const pmi = dpPct < 0.20 ? (loan * 0.005 / 12) : 0;
  return { monthly, total, interest, loan, dpPct, pmi };
}

// ---- UI --------------------------------------------------------------------
let suppressUrlUpdate = false;

function getInput() {
  const v = calcForm.getValues();
  return {
    principal:    parseFloat(v.principal) || 0,
    downPayment:  parseFloat(v.downPayment) || 0,
    rate:         parseFloat(v.rate) || 0,
    years:        parseInt(v.years, 10) || 0,
  };
}

// Track the last-saved input so we can show "Modified" status when the
// form drifts from what's encoded in the URL.
let lastSavedInputJson = null;

function isModified() {
  if (lastSavedInputJson === null) return false;
  return JSON.stringify(getInput()) !== lastSavedInputJson;
}

function setStatus(msg, kind /* 'info' | 'ok' | 'warn' */) {
  const colors = { info: '#888', ok: '#2e7d32', warn: '#c75300' };
  const c = colors[kind || 'info'];
  shareStatus.setContents(msg
    ? `<span style='color:${c};font-size:12px;'>${escapeHtml(msg)}</span>`
    : '');
}

function refreshStatus() {
  if (lastSavedInputJson === null) {
    setStatus('Click Calculate to see the math; click Save to capture as a shareable link.', 'info');
  } else if (isModified()) {
    setStatus('Modified — click Save to update the link.', 'warn');
  } else {
    setStatus('Saved — URL in address bar reflects this scenario. Use Share to send it.', 'ok');
  }
}

function recalc() {
  const input = getInput();
  const out = calculate(input);
  if (!out) {
    result.setContents("<div style='color:#888;font-size:13px;'>Enter loan amount, rate, and term, then click Calculate.</div>");
    return null;
  }
  const fmt0 = (n) => n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  const fmt2 = (n) => n.toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 });
  const pmiLine = out.pmi > 0
    ? `<div style='color:#a05; font-size:12px; margin-top:4px;'>PMI estimate: <b>+$${fmt2(out.pmi)}/mo</b> (down payment ${(out.dpPct * 100).toFixed(0)}% &lt; 20%)</div>`
    : '';
  result.setContents(
    `<div style='font-size:24px;color:#1976d2;font-weight:600;'>$${fmt2(out.monthly)}` +
    `<span style='font-size:14px;color:#666;font-weight:400;'> / month P&I</span></div>` +
    `<div style='margin-top:6px;font-size:13px;color:#555;'>` +
      `Loan: <b>$${fmt0(out.loan)}</b> &middot; ` +
      `Total paid: <b>$${fmt0(out.total)}</b> &middot; ` +
      `Interest: <b>$${fmt0(out.interest)}</b>` +
    `</div>` + pmiLine
  );
  return out;
}

// Save action: commits current form values as the canonical scenario.
// Updates URL hash, adds to recents, clears the modified state.
async function saveScenario() {
  const input = getInput();
  const out = recalc(); // make sure result panel matches
  if (!out) { setStatus('Fill in all fields before saving.', 'warn'); return null; }
  const hash = await encodeScenario(input);
  history.replaceState(null, '', '#i=' + hash);
  await saveRecent(input, out);
  lastSavedInputJson = JSON.stringify(input);
  refreshStatus();
  return { input, out, url: location.origin + location.pathname + '#i=' + hash };
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  return Promise.reject(new Error('clipboard unavailable'));
}

async function nativeShare(url, title, text) {
  if (!navigator.share) return false;
  try {
    await navigator.share({ url, title, text });
    return true;
  } catch (e) {
    if (e.name === 'AbortError') return true; // user cancelled — that's fine
    return false;
  }
}

// Build the QR data-uri image tag for any URL.
function buildQrImg(url) {
  // Pick the smallest QR version that fits, error correction M (~15% damage tolerance).
  // qrcode-generator picks version automatically when typeNumber=0.
  const qr = qrcode(0, 'M');
  qr.addData(url);
  qr.make();
  // cellSize=4, margin=2 → ~150-200px image for our URL sizes
  return qr.createImgTag(4, 8);
}

// Open the share modal. mode = 'live' (input only, re-runs on open)
//                            'snapshot' (input + frozen output)
//
// Requires a saved scenario. If the form is unsaved/modified, prompt to
// save first — sharing should always reflect a deliberate snapshot of state.
async function openShare(mode) {
  if (lastSavedInputJson === null || isModified()) {
    isc.confirm('Save current values first?', function (ok) {
      if (ok) saveScenario().then(function () { openShare(mode); });
    });
    return;
  }
  const input = getInput();
  const out = calculate(input);
  if (!out) {
    isc.warn('Enter loan details first.');
    return;
  }

  // Build URL
  const payload = mode === 'snapshot'
    ? await encodeScenario(input, { monthly: out.monthly, total: out.total, interest: out.interest, pmi: out.pmi })
    : await encodeScenario(input);
  const url = location.origin + location.pathname + '#' + (mode === 'snapshot' ? 'z' : 'i') + '=' + payload;

  const title = 'Mortgage scenario';
  const labelText = mode === 'snapshot'
    ? `Snapshot · ${url.length} chars · recipient sees the captured monthly`
    : `Live link · ${url.length} chars · recalculates on open`;

  const imgTag = buildQrImg(url);
  const hasNativeShare = !!navigator.share;

  // Compose the modal content as HTMLFlow + buttons row
  // Use a SC Window with members.
  // Render QR with cellSize=3 (smaller), margin=4 — keeps the image to ~180px
  // for a 250-char URL (version 7 QR, 45 modules × 3 + 8 margin ≈ 143px).
  // Old cellSize=4, margin=8 produced a ~244px QR that overflowed the window.
  const qr = qrcode(0, 'M');
  qr.addData(url);
  qr.make();
  const compactImgTag = qr.createImgTag(3, 4);

  const win = isc.Window.create({
    title: 'Share scenario',
    width: 440,
    height: 540,
    autoCenter: true,
    isModal: true,
    showModalMask: true,
    canDragResize: false,
    showMaximizeButton: false,
    showMinimizeButton: false,
    closeClick: function () { this.destroy(); },
    items: [
      isc.VLayout.create({
        width: '100%', height: '100%', padding: 16, membersMargin: 10,
        overflow: 'hidden',
        members: [
          isc.Label.create({
            width: '100%', height: 200, align: 'center',
            contents: "<div style='text-align:center;line-height:1;'>" + compactImgTag + "</div>"
          }),
          isc.Label.create({
            width: '100%', height: 28, align: 'center', wrap: false,
            contents: "<div style='font-size:11px;color:#666;line-height:1.3;'>" + escapeHtml(labelText) + "</div>"
          }),
          isc.Label.create({
            width: '100%', height: 32,
            contents:
              "<input type='text' id='shareUrlInput' value='" + escapeHtml(url) + "' readonly " +
              "onclick='this.select();' " +
              "style='width:100%;box-sizing:border-box;padding:6px;font-family:monospace;font-size:11px;border:1px solid #ccc;border-radius:3px;' />"
          }),
          isc.HLayout.create({
            width: '100%', height: 32, membersMargin: 8, align: 'center',
            members: [
              isc.Button.create({
                title: 'Copy URL', width: 100,
                click: function () {
                  copyToClipboard(url).then(
                    function () { isc.say('Copied to clipboard'); },
                    function () { isc.warn('Copy failed — select the URL above and copy manually.'); }
                  );
                }
              }),
              isc.Button.create({
                title: hasNativeShare ? 'Native share…' : 'Share unavailable',
                width: 130,
                disabled: !hasNativeShare,
                click: function () {
                  nativeShare(url, title, mode === 'snapshot' ? 'See this mortgage scenario' : 'Mortgage calculator link');
                }
              }),
              isc.Button.create({
                title: 'Close', width: 70,
                click: function () { win.destroy(); }
              })
            ]
          }),
          isc.Label.create({
            width: '100%', height: 50, padding: 4,
            contents: "<div style='font-size:10px;color:#888;line-height:1.5;'>" +
              "<b>Phone:</b> open camera, point at QR — opens this scenario on mobile." +
              "<br><b>Mobile share:</b> Native share opens iMessage / Mail / WhatsApp / AirDrop." +
              "<br><b>Anywhere:</b> Copy URL pastes the link." +
              "</div>"
          })
        ]
      })
    ]
  });
  win.show();
}

function rebuildRecents() {
  const recents = getRecents();
  if (recents.length === 0) {
    recentsList.setContents("<em style='color:#888;font-size:12px;'>No saved scenarios yet. Click <b>Save</b> after calculating.</em>");
    return;
  }
  const rows = recents.map((r) => {
    const monthly = r.monthly ? `$${r.monthly.toLocaleString('en-US', { maximumFractionDigits: 0 })}/mo` : '';
    // Setting location.hash triggers hashchange -> restoreFromHash, which
    // populates the form, recalcs, and updates status all in one path.
    // void(...) suppresses the assignment's return value — without it, the
    // browser would render the resulting string as the entire page body
    // (a classic javascript: URL footgun).
    return `<a href='javascript:void(location.hash="i=${r.hash}")' ` +
           `style='display:flex;justify-content:space-between;padding:4px 8px;text-decoration:none;color:#333;border-bottom:1px solid #eee;'>` +
           `<span>${escapeHtml(r.label)}</span><span style='color:#1976d2;'>${escapeHtml(monthly)}</span></a>`;
  }).join('');
  recentsList.setContents(rows);
}

async function restoreFromHash() {
  const parsed = await parseHash();
  if (!parsed) return false;
  const restoredInput = {
    principal:   parsed.i.principal || 0,
    downPayment: parsed.i.downPayment || 0,
    rate:        parsed.i.rate || 0,
    years:       parsed.i.years || 0,
  };
  calcForm.setValues(restoredInput);
  recalc();
  // Mark this as the saved baseline — edits-against-it will trigger Modified.
  lastSavedInputJson = JSON.stringify(restoredInput);
  refreshStatus();
  if (parsed.mode === 'snapshot' && parsed.o) {
    const captured = new Date(parsed.t).toLocaleString();
    snapshotBanner.setContents(
      `<div style='background:#fff8e1;border-left:3px solid #f57c00;padding:6px 10px;font-size:12px;color:#5d4037;'>` +
      `<b>Snapshot</b> captured ${captured}. ` +
      `Sender's monthly was <b>$${parsed.o.monthly.toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 })}</b>. ` +
      `Live recompute shown above (any rate/value changes since then would shift it). ` +
      `Edit + Save to capture your own variant.` +
      `</div>`
    );
    snapshotBanner.show();
  } else {
    snapshotBanner.hide();
  }
  return true;
}

// ---- Bootstrap -------------------------------------------------------------
isc.VLayout.create({
  ID: "root",
  width: 520,
  autoDraw: true,
  padding: 24,
  membersMargin: 12,
  members: [
    isc.Label.create({
      height: 40,
      contents: "<div style='font-size:20px;font-weight:600;color:#222;'>Mortgage Calculator</div>" +
                "<div style='font-size:11px;color:#888;'>Save scenarios via URL — works across devices, no account.</div>"
    }),
    isc.Label.create({ ID: "snapshotBanner", height: 1, visibility: "hidden", contents: "" }),
    isc.DynamicForm.create({
      ID: "calcForm",
      width: "100%",
      numCols: 2,
      colWidths: [160, "*"],
      titleOrientation: "left",
      autoFocus: true,
      // Use type:"text" instead of "float"/"integer". SC's FloatItem and
      // IntegerItem don't sync DOM input -> model in this setup: typing
      // updates the visible input but the SC model stays stale, and on
      // blur the input reverts to the old value. Plain text fields don't
      // have that issue. We parse to numbers in calculate(). The change
      // handler is `changed` (singular, fires after value commit) rather
      // than `change` (which on text fires per-keystroke and would defeat
      // the explicit Calculate-button flow).
      fields: [
        { name: "principal",   title: "Home Price ($)",     type: "text", defaultValue: "350000", changed: refreshStatus },
        { name: "downPayment", title: "Down Payment ($)",   type: "text", defaultValue: "50000",  changed: refreshStatus },
        { name: "rate",        title: "Interest Rate (%)",  type: "text", defaultValue: "7",      changed: refreshStatus },
        { name: "years",       title: "Term (years)",       type: "text", defaultValue: "30",     changed: refreshStatus }
      ]
    }),
    isc.Label.create({ ID: "result", height: 80, padding: 4, overflow: "hidden", contents: "" }),
    isc.HLayout.create({
      ID: "actionBar",
      height: 32,
      membersMargin: 6,
      members: [
        isc.Button.create({ ID: "btnCalc",        title: "Calculate",     width: 100,
          click: function() { recalc(); refreshStatus(); } }),
        isc.Button.create({ ID: "btnSave",        title: "Save",          width: 80,
          click: function() { saveScenario(); } }),
        isc.Button.create({ ID: "btnShareLive",   title: "Share Live",    width: 100,
          click: function() { openShare('live'); } }),
        isc.Button.create({ ID: "btnShareSnap",   title: "Share Snapshot", width: 130,
          click: function() { openShare('snapshot'); } })
      ]
    }),
    isc.Label.create({ ID: "shareStatus", width: "100%", height: 22, padding: 2, contents: "" }),
    isc.Label.create({ height: 18, contents: "<div style='font-size:12px;color:#888;'>Recent scenarios (this device)</div>" }),
    // Label defaults to valign:"center" — that pushes a single recent row
    // to the middle of a 200px box. Force top-align so rows stack downward
    // as they're added.
    isc.Label.create({ ID: "recentsList", height: 200, overflow: "auto",
                       padding: 0, valign: "top", align: "left", contents: "" })
  ]
});

(async function init() {
  const restored = await restoreFromHash();
  if (!restored) {
    // Fresh load — show defaults but don't auto-calculate. The user drives
    // the first compute via the Calculate button.
    refreshStatus();
  }
  rebuildRecents();
})();

window.addEventListener('hashchange', restoreFromHash);
</script>
</body>
</html>
